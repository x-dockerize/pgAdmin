services:
  pgAdmin:
    image: dpage/pgadmin4:9.12
    container_name: pgAdmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: '${ADMIN_EMAIL}'
      PGADMIN_DEFAULT_PASSWORD: '${ADMIN_PASSWORD}'
    volumes:
      - ./.docker/pgAdmin/data:/var/lib/pgadmin
      - ./.docker/pgAdmin/backups:/backups
    networks:
      - traefik-network
      - postgres-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network

      - traefik.http.routers.pgAdmin.rule=Host(`${PGADMIN_SERVER_HOSTNAME:?required}`)
      - traefik.http.routers.pgAdmin.entrypoints=websecure
      - traefik.http.routers.pgAdmin.tls.certresolver=le-cloudflare
      - traefik.http.routers.pgAdmin.service=pgAdmin

      # Services
      - traefik.http.services.pgAdmin.loadbalancer.server.port=80


networks:
  traefik-network:
    external: true
  postgres-network:
    external: true
